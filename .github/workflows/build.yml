name: Build DLL

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
            artifact_suffix: ""
          - target: i686-pc-windows-msvc
            arch: x86
            artifact_suffix: -x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build DLL (Debug, ${{ matrix.arch }})
        run: cargo build --target ${{ matrix.target }}

      - name: Build DLL (Release, ${{ matrix.arch }})
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Debug DLL (${{ matrix.arch }})
        uses: actions/upload-artifact@v7
        with:
          name: coldloader-debug${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/debug/*.dll

      - name: Upload Release DLL (${{ matrix.arch }})
        uses: actions/upload-artifact@v7
        with:
          name: coldloader-release${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/*.dll
